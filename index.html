<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator FDX Buscas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --accent: #c8f060;
    --accent2: #a8d040;
    --danger: #ff5f5f;
    --success: #60f0a0;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --radius: 6px;
    --radius2: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  .logo-mark {
    width: 28px; height: 28px; background: var(--accent);
    border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  .logo-mark svg { width: 16px; height: 16px; }

  h1 { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; }
  .tagline { font-size: 12px; color: var(--text2); font-family: var(--mono); }

  .section-label {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
  }

  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--mono);
    font-size: 12px; padding: 12px; resize: vertical; outline: none; transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--border2); }
  textarea::placeholder { color: var(--text3); }
  #input { min-height: 200px; }

  .hint { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 6px; }
  .hint code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; color: var(--text2); }

  .btn-row { display: flex; gap: 8px; margin: 14px 0 2rem; }

  button {
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    padding: 8px 0; border-radius: var(--radius); border: 1px solid var(--border2);
    background: transparent; color: var(--text2); cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.02em; flex: 1;
  }

  button:hover { border-color: var(--text3); color: var(--text); }

  button.primary {
    background: var(--accent); border-color: var(--accent); color: #0f0f0f; font-weight: 500;
  }

  button.primary:hover { background: var(--accent2); border-color: var(--accent2); }

  .output-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius2); overflow: hidden; margin-bottom: 2rem;
  }

  .output-header {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }

  .output-status { font-family: var(--mono); font-size: 11px; color: var(--text2); flex: 1; }
  .output-status.ready { color: var(--accent); }

  .copied-msg { font-size: 11px; color: var(--success); font-family: var(--mono); display: none; }

  #tsv-output {
    min-height: 60px; border: none; border-radius: 0;
    background: var(--surface); font-size: 11px; color: var(--text2); padding: 12px 14px;
  }

  #tsv-output:focus { border-color: transparent; }

  .results { display: flex; flex-direction: column; gap: 12px; margin-bottom: 2rem; }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius2); overflow: hidden; animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .card-top {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: #1e2a12;
    border: 1px solid #3a5020; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--accent); flex-shrink: 0;
  }

  .card-name { font-size: 14px; font-weight: 500; color: var(--text); }

  .card-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }

  .card-field {
    padding: 10px 14px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }

  .card-field:nth-child(even) { border-right: none; }
  .card-field.full { grid-column: 1 / -1; border-right: none; }
  .card-field:last-child { border-bottom: none; }
  .card-field.full:last-child { border-bottom: none; }

  .f-label {
    font-family: var(--mono); font-size: 9px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px;
  }

  .f-value { font-size: 13px; color: var(--text); display: flex; flex-direction: column; gap: 2px; }
  .f-value span { font-size: 12px; }
  .empty { color: var(--text3); font-style: italic; font-size: 12px; }
  .count-line { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .error { font-family: var(--mono); font-size: 12px; color: var(--danger); padding: 8px 0; display: none; }

  footer { border-top: 1px solid var(--border); padding-top: 1.5rem; font-family: var(--mono); font-size: 11px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="5" height="5" fill="#0f0f0f"/>
          <rect x="9" y="2" width="5" height="5" fill="#0f0f0f"/>
          <rect x="2" y="9" width="5" height="5" fill="#0f0f0f"/>
          <rect x="9" y="9" width="5" height="5" fill="#0f0f0f" opacity="0.4"/>
        </svg>
      </div>
      <h1>fdx-extrator</h1>
    </div>
    <p class="tagline">Extração estruturada de dados do FDX Buscas</p>
  </header>

  <p class="section-label">Entrada</p>
  <textarea id="input" placeholder="Cole aqui o resultado copiado do FDX Buscas..."></textarea>
  <p class="hint">Para múltiplos contatos, separe cada bloco com <code>---</code> em uma linha isolada.</p>

  <div class="btn-row">
    <button onclick="limpar()">Limpar</button>
    <button class="primary" onclick="processar()">Extrair dados</button>
    <button onclick="copiarTSV()">Copiar <span id="copied-msg" style="color: var(--success); display:none;">✓</span></button>
  </div>

  <div id="error" class="error"></div>

  <p class="section-label">Saída — Sexo / Renda / Telefone / Email / Cidade</p>
  <div class="output-block">
    <div class="output-header">
      <span class="output-status" id="output-status">Aguardando extração...</span>
    </div>
    <textarea id="tsv-output" readonly onclick="this.select()" placeholder="O resultado aparecerá aqui após a extração..."></textarea>
  </div>

  <div id="results" class="results"></div>

  <footer>fdx-extrator · Oregon Invest · 2026</footer>

</div>

<script>
function parseDate(str) {
  if (!str || str === 'SEM RESULTADO') return null;
  const parts = str.trim().split('/');
  if (parts.length >= 2) {
    const m = parseInt(parts[parts.length - 2]);
    const y = parseInt(parts[parts.length - 1]);
    if (!isNaN(m) && !isNaN(y)) return { m, y, key: y * 100 + m };
  }
  return null;
}

function getVal(lines, key) {
  for (const l of lines) {
    const idx = l.indexOf(':');
    if (idx === -1) continue;
    const k = l.substring(0, idx).trim().toUpperCase();
    if (k === key.toUpperCase()) {
      const v = l.substring(idx + 1).trim();
      return (v === 'SEM RESULTADO' || v === '') ? null : v;
    }
  }
  return null;
}

function initials(nome) {
  if (!nome) return '?';
  const parts = nome.trim().split(' ').filter(Boolean);
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function parseBloco(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = { nome: getVal(lines, 'NOME'), sexo: getVal(lines, 'SEXO'), renda: getVal(lines, 'RENDA'), telefones: [], emails: [], cidade: null };

  for (const l of lines) {
    const idx = l.indexOf(':');
    if (idx === -1) continue;
    const k = l.substring(0, idx).trim().toUpperCase();
    if (k === 'TELEFONE') {
      const v = l.substring(idx + 1).trim();
      if (v && v !== 'SEM RESULTADO' && !result.telefones.includes(v)) result.telefones.push(v);
    }
  }

  const emailBlocos = [];
  let current = null;
  for (const l of lines) {
    const idx = l.indexOf(':');
    if (idx === -1) continue;
    const k = l.substring(0, idx).trim().toUpperCase();
    const v = l.substring(idx + 1).trim();
    if (k === 'EMAIL' && v && v !== 'SEM RESULTADO') {
      if (current) emailBlocos.push(current);
      current = { email: v, dt: null };
    } else if (k === 'DT INCLUSÃO' && current && !current.dt) {
      current.dt = parseDate(v);
    }
  }
  if (current) emailBlocos.push(current);

  let maxKey = -1;
  for (const b of emailBlocos) { if (b.dt && b.dt.key > maxKey) maxKey = b.dt.key; }
  const bestEmails = maxKey > -1 ? emailBlocos.filter(b => b.dt && b.dt.key === maxKey) : emailBlocos;
  result.emails = [...new Set(bestEmails.map(b => b.email))];

  const endBlocos = [];
  let cEnd = null;
  for (const l of lines) {
    const idx = l.indexOf(':');
    if (idx === -1) continue;
    const k = l.substring(0, idx).trim().toUpperCase();
    const v = l.substring(idx + 1).trim();
    if (k === 'LOGRADOURO TIPO') { if (cEnd) endBlocos.push(cEnd); cEnd = { cidade: null, dt: null }; }
    if (!cEnd) continue;
    if (k === 'CIDADE' && v && v !== 'SEM RESULTADO') cEnd.cidade = v;
    if (k === 'DT INCLUSÃO' && cEnd && !cEnd.dt) cEnd.dt = parseDate(v);
  }
  if (cEnd) endBlocos.push(cEnd);

  let maxEndKey = -1;
  for (const b of endBlocos) { if (b.dt && b.dt.key > maxEndKey) maxEndKey = b.dt.key; }
  const bestEnd = maxEndKey > -1 ? endBlocos.filter(b => b.dt && b.dt.key === maxEndKey) : endBlocos;
  const cidades = [...new Set(bestEnd.map(b => b.cidade).filter(Boolean))];
  result.cidade = cidades.length > 0 ? cidades.join(' / ') : null;

  return result;
}

let parsed = [];

function processar() {
  const raw = document.getElementById('input').value.trim();
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  if (!raw) { errEl.textContent = 'Cole algum dado antes de extrair.'; errEl.style.display = 'block'; return; }

  const blocos = raw.split(/\n---\n/).map(b => b.trim()).filter(Boolean);
  parsed = blocos.map(parseBloco);

  const container = document.getElementById('results');
  container.innerHTML = '';
  if (parsed.length > 0) container.insertAdjacentHTML('beforeend', `<p class="count-line">${parsed.length} contato(s) processado(s)</p>`);

  for (const p of parsed) {
    const tel = p.telefones.length ? p.telefones.map(t => `<span>${t}</span>`).join('') : '<span class="empty">não encontrado</span>';
    const email = p.emails.length ? p.emails.map(e => `<span>${e}</span>`).join('') : '<span class="empty">não encontrado</span>';
    container.insertAdjacentHTML('beforeend', `
      <div class="result-card">
        <div class="card-top">
          <div class="avatar">${initials(p.nome)}</div>
          <div class="card-name">${p.nome || '—'}</div>
        </div>
        <div class="card-fields">
          <div class="card-field"><div class="f-label">Sexo</div><div class="f-value">${p.sexo || '<span class="empty">—</span>'}</div></div>
          <div class="card-field"><div class="f-label">Renda</div><div class="f-value">${p.renda ? 'R$ ' + parseFloat(p.renda).toLocaleString('pt-BR', {minimumFractionDigits:2}) : '<span class="empty">—</span>'}</div></div>
          <div class="card-field"><div class="f-label">Telefone(s)</div><div class="f-value">${tel}</div></div>
          <div class="card-field"><div class="f-label">Email(s)</div><div class="f-value">${email}</div></div>
          <div class="card-field full"><div class="f-label">Cidade</div><div class="f-value">${p.cidade || '<span class="empty">—</span>'}</div></div>
        </div>
      </div>
    `);
  }

  const rows = parsed.map(p => [
    p.sexo || '',
    p.renda || '',
    p.telefones.join(' | '),
    p.emails.join(' | '),
    p.cidade || ''
  ].join('\t'));

  document.getElementById('tsv-output').value = rows.join('\n');
  const status = document.getElementById('output-status');
  status.textContent = `${parsed.length} contato(s) — pronto para colar no Sheets`;
  status.className = 'output-status ready';
}

function copiarTSV() {
  const el = document.getElementById('tsv-output');
  if (!el.value) return;
  el.select();
  try {
    document.execCommand('copy');
    const msg = document.getElementById('copied-msg');
    if (msg) { msg.style.display = 'inline'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
  } catch(e) {}
}

function limpar() {
  document.getElementById('input').value = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('tsv-output').value = '';
  const status = document.getElementById('output-status');
  status.textContent = 'Aguardando extração...';
  status.className = 'output-status';
  document.getElementById('error').style.display = 'none';
  parsed = [];
  document.getElementById('input').focus();
}
</script>
</body>
</html>
